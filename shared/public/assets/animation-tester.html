<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animation Tester — Tap of Exile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #101524; color: #F9CF87; font-family: monospace; padding: 16px; }

  h1 { text-align: center; margin-bottom: 12px; font-size: 18px; letter-spacing: 1px; }

  /* ── Tab Nav ── */
  .tab-nav { display: flex; gap: 4px; justify-content: center; margin-bottom: 12px; }
  .tab-nav button {
    background: #1a2040; color: #F9CF87; border: 1px solid #A40239;
    padding: 8px 24px; font-family: monospace; font-size: 13px;
    border-radius: 4px; cursor: pointer;
  }
  .tab-nav button:hover { background: #A40239; }
  .tab-nav button.active { background: #A40239; }

  /* ── Global Controls ── */
  #controls {
    display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    align-items: center; justify-content: center;
  }
  #controls label { color: #F9CF87; font-size: 13px; }
  #controls select, #controls button, #controls input {
    background: #1a2040; color: #F9CF87; border: 1px solid #A40239;
    padding: 6px 10px; font-family: monospace; font-size: 13px; border-radius: 4px;
  }
  #controls button { cursor: pointer; }
  #controls button:hover { background: #A40239; }
  #controls button.active { background: #A40239; }

  /* ── Status ── */
  .status { text-align: center; margin-bottom: 8px; font-size: 12px; color: #DFFFFE; min-height: 18px; }

  /* ── Sub-controls / filter bar ── */
  .filter-bar {
    display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px;
  }
  .filter-bar button, .filter-bar label { color: #F9CF87; font-size: 12px; }
  .filter-bar button {
    background: #1a2040; border: 1px solid #A40239;
    padding: 4px 10px; font-family: monospace; border-radius: 4px; cursor: pointer;
  }
  .filter-bar button:hover { background: #A40239; }
  .filter-bar button.active { background: #A40239; }
  .filter-bar select {
    background: #1a2040; color: #F9CF87; border: 1px solid #A40239;
    padding: 4px 10px; font-family: monospace; font-size: 12px; border-radius: 4px; cursor: pointer;
  }

  /* ── Tab Panes ── */
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Shared grid ── */
  .grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }

  /* ── Character sections ── */
  .char-section {
    margin-bottom: 24px; border: 1px solid #333; border-radius: 8px;
    padding: 16px; background: #0d1120;
  }
  .char-section h2 {
    font-size: 14px; margin-bottom: 12px; color: #DFFFFE;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .skin-label { font-size: 12px; color: #B9508D; margin-bottom: 4px; }
  .skin-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
  .anim-card {
    background: #1a2040; border: 1px solid #333; border-radius: 6px;
    padding: 8px; text-align: center; min-width: 100px;
  }
  .anim-card.error { border-color: #ff4444; }
  .anim-name { font-size: 10px; color: #888; margin-bottom: 4px; }

  /* ── Sprite cards (enemies & skills) ── */
  .sprite-card {
    background: #1a2040; border: 1px solid #333; border-radius: 8px;
    padding: 12px; width: 200px; text-align: center;
  }
  .sprite-card.error { border-color: #ff4444; }
  .sprite-card.warning { border-color: #ffaa00; }
  .sprite-card h3 { font-size: 12px; margin-bottom: 4px; word-break: break-all; }
  .sprite-card .info { font-size: 10px; color: #888; margin-bottom: 8px; }
  .sprite-card .frame-info { font-size: 10px; color: #DFFFFE; }
  .sprite-card .issues { font-size: 10px; text-align: left; margin-top: 4px; }
  .sprite-card .issues li { margin-left: 12px; }

  /* ── Shared canvas ── */
  canvas {
    border: 1px solid #333; image-rendering: pixelated;
    display: block; margin: 0 auto 4px;
    background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0 / 12px 12px;
  }
  .frame-info { font-size: 9px; color: #DFFFFE; }

  /* ── Validation report ── */
  #skills-report {
    background: #1a2040; border: 1px solid #333; border-radius: 8px;
    padding: 16px; margin-top: 16px; font-size: 12px;
    white-space: pre-wrap; max-height: 400px; overflow-y: auto;
  }

  /* ── Equipment tab ── */
  .equip-section {
    margin-bottom: 24px; border: 1px solid #333; border-radius: 8px;
    padding: 16px; background: #0d1120;
  }
  .equip-section h2 {
    font-size: 14px; margin-bottom: 12px; color: #DFFFFE;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .equip-section h3 {
    font-size: 12px; margin-bottom: 8px; color: #B9508D;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .equip-cards { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
  .equip-card {
    background: #1a2040; border: 1px solid #333; border-radius: 6px;
    padding: 10px 14px; min-width: 140px; flex: 1;
  }
  .equip-card .card-title { font-size: 12px; font-weight: bold; margin-bottom: 4px; }
  .equip-card .card-detail { font-size: 10px; color: #888; line-height: 1.5; }
  .equip-table {
    width: 100%; border-collapse: collapse; font-size: 11px; margin-bottom: 8px;
  }
  .equip-table th {
    background: #1a2040; color: #DFFFFE; text-align: left; padding: 6px 8px;
    border-bottom: 2px solid #A40239; font-size: 10px; text-transform: uppercase;
    letter-spacing: 1px; white-space: nowrap;
  }
  .equip-table td {
    padding: 5px 8px; border-bottom: 1px solid #222; vertical-align: top;
  }
  .equip-table tr:hover { background: #1a2040; }
  .rarity-badge {
    display: inline-block; padding: 1px 6px; border-radius: 3px;
    font-size: 10px; font-weight: bold; color: #000;
  }
  .slot-badge {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    font-size: 9px; background: #2a3060; color: #DFFFFE; margin: 1px;
  }
  .stat-badge {
    display: inline-block; padding: 1px 5px; border-radius: 3px;
    font-size: 9px; margin: 1px; background: #1a2040; border: 1px solid #444;
  }
  .stat-badge.offensive { color: #ff6b6b; border-color: #ff6b6b44; }
  .stat-badge.defensive { color: #4488ff; border-color: #4488ff44; }
  .stat-badge.utility { color: #DFFFFE; border-color: #DFFFFE44; }
  .tier-val { font-family: monospace; font-size: 10px; color: #F9CF87; }
  .implicit-tag { color: #B9508D; font-style: italic; font-size: 10px; }
  details.equip-details {
    margin-bottom: 8px; border: 1px solid #333; border-radius: 6px;
    background: #0d1120;
  }
  details.equip-details summary {
    cursor: pointer; padding: 8px 12px; font-size: 12px;
    color: #DFFFFE; font-weight: bold; text-transform: uppercase;
    letter-spacing: 1px;
  }
  details.equip-details summary:hover { background: #1a2040; }
  details.equip-details[open] summary { border-bottom: 1px solid #333; }
  details.equip-details .details-body { padding: 12px; }
  .formula-box {
    background: #1a2040; border: 1px solid #A40239; border-radius: 6px;
    padding: 12px 16px; font-family: monospace; font-size: 11px;
    color: #F9CF87; line-height: 1.8;
  }
  .cat-header td {
    background: #12182e; color: #B9508D; font-weight: bold; font-size: 11px;
    text-transform: uppercase; letter-spacing: 1px; padding: 6px 8px;
    border-bottom: 1px solid #A40239;
  }
</style>
</head>
<body>

<h1>Animation Tester — Tap of Exile</h1>

<!-- Tab Navigation -->

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- TAB: Characters                                                 -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="tab-characters" class="tab-pane active">

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- TAB: Enemies                                                    -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="tab-enemies" class="tab-pane">

  <div class="grid" id="enemy-grid"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- TAB: Skills                                                     -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="tab-skills" class="tab-pane">

        <option value="v6_frost">v6 frost</option>
        <option value="v7_shadow">v7 shadow</option>

    <button data-filter="fire">Fire</button>
    <button data-filter="earth">Earth</button>
    <button data-filter="thunder">Thunder</button>
    <button data-filter="water">Water</button>

    <button data-filter="effect">Effects</button>
    <button data-filter="melee">Melee</button>

  <div class="grid" id="skills-grid"></div>
  <div id="skills-report" style="display:none"></div>
</div>

<div id="tab-equipment" class="tab-pane">

function parseFrames(json) {
  return Array.isArray(json.frames) ? json.frames : Object.values(json.frames);
}

/** Draw current frame of a sprite onto its canvas. */
function drawFrame(sd) {
  const frames = sd.frames ?? sd.json?.frames;
  if (!frames) return;
  const f = frames[sd.currentFrame];
  if (!f) return;
  const ctx = sd.canvas.getContext('2d');
  ctx.clearRect(0, 0, sd.canvas.width, sd.canvas.height);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(sd.img, f.frame.x, f.frame.y, f.frame.w, f.frame.h,
                0, 0, sd.canvas.width, sd.canvas.height);
  if (sd.frameInfo) sd.frameInfo.textContent = `${sd.currentFrame + 1}/${frames.length}`;
}

/** Advance frame timers for all sprites in a collection. */
function advanceSprites(collection, dt) {
  const speed = parseFloat(speedSlider.value);
  const items = Array.isArray(collection) ? collection : Object.values(collection);
  for (const sd of items) {
    const frames = sd.frames ?? sd.json?.frames;
    if (!frames || frames.length === 0) continue;
    sd.elapsed += dt * speed;
    const dur = frames[sd.currentFrame]?.duration || 100;
    if (sd.elapsed >= dur) {
      sd.elapsed -= dur;
      sd.currentFrame = (sd.currentFrame + 1) % frames.length;
    }
  }
}

/** Draw all sprites in a collection (active tab only). */
function drawAll(collection) {
  const items = Array.isArray(collection) ? collection : Object.values(collection);
  for (const sd of items) drawFrame(sd);
}

/** Step one frame forward for all sprites in a collection. */
function stepCollection(collection) {
  const items = Array.isArray(collection) ? collection : Object.values(collection);
  for (const sd of items) {
    const frames = sd.frames ?? sd.json?.frames;
    if (!frames || frames.length === 0) continue;
    sd.currentFrame = (sd.currentFrame + 1) % frames.length;
    drawFrame(sd);
  }
}

// ═════════════════════════════════════════════════════════════════
// SINGLE RAF LOOP
// ═════════════════════════════════════════════════════════════════

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;

  if (!paused) {
    // Advance time for ALL loaded tabs (so time doesn't freeze when switching)
    if (tabLoaded.characters) advanceSprites(charAnimData, dt);
    if (tabLoaded.enemies)    advanceSprites(enemyData, dt);
    if (tabLoaded.skills)     advanceSprites(skillData, dt);

    // Render only the visible tab
    if      (activeTab === 'characters' && tabLoaded.characters) drawAll(charAnimData);
    else if (activeTab === 'enemies'    && tabLoaded.enemies)    drawAll(enemyData);
    else if (activeTab === 'skills'     && tabLoaded.skills)     drawAll(skillData);
  }

  rafHandle = requestAnimationFrame(loop);
}

async function loadCharacters() {
  charAnimData.length = 0;
  charContent.innerHTML = '';
  let loaded = 0, errors = 0;
  charStatus.textContent = 'Loading characters…';

  for (const charClass of CHARACTERS) {
    const section = document.createElement('div');
    section.className = 'char-section';
    section.dataset.class = charClass.class;

    const h2 = document.createElement('h2');
    h2.textContent = charClass.class;
    section.appendChild(h2);

    for (const skin of charClass.skins) {
      const skinDiv = document.createElement('div');
      skinDiv.style.marginBottom = '12px';

      const label = document.createElement('div');
      label.className = 'skin-label';
      label.textContent = skin.id;
      skinDiv.appendChild(label);

      const row = document.createElement('div');
      row.className = 'skin-row';

      if (skin.anims.length === 0) {
        const note = document.createElement('div');
        note.style.cssText = 'font-size:11px;color:#ff4444;';
        note.textContent = 'No JSON animations found';
        row.appendChild(note);
        errors++;
      }

      const basePath = `characters/${charClass.class}/${skin.id}`;
      let spritesheetImg = null;

      for (const anim of skin.anims) {
        const card = document.createElement('div');
        card.className = 'anim-card';

        const animName = document.createElement('div');
        animName.className = 'anim-name';
        animName.textContent = anim;
        card.appendChild(animName);

        const canvas = document.createElement('canvas');
        canvas.width = 96; canvas.height = 96;
        card.appendChild(canvas);

        const frameInfo = document.createElement('div');
        frameInfo.className = 'frame-info';
        card.appendChild(frameInfo);

        row.appendChild(card);

        try {
          const resp = await fetch(`${basePath}/${anim}.json`);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const json = await resp.json();
          const frames = parseFrames(json);
          const pngName = json.meta.image;

          let img;
          if (pngName === 'spritesheet.png' && spritesheetImg) {
            img = spritesheetImg;
          } else {
            img = new Image();
            img.crossOrigin = 'anonymous';
            await new Promise((res, rej) => {
              img.onload = res;
              img.onerror = () => rej(new Error('PNG load failed'));
              img.src = `${basePath}/${pngName}`;
            });
            if (pngName === 'spritesheet.png') spritesheetImg = img;
          }

          const fw = frames[0]?.frame?.w || 64;
          const fh = frames[0]?.frame?.h || 64;
          const scale = Math.min(96 / fw, 96 / fh, 4);
          canvas.width  = Math.ceil(fw * scale);
          canvas.height = Math.ceil(fh * scale);

          const sd = { frames, img, canvas, frameInfo, currentFrame: 0, elapsed: 0 };
          charAnimData.push(sd);
          drawFrame(sd);
          loaded++;
        } catch (e) {
          card.classList.add('error');
          const err = document.createElement('div');
          err.style.cssText = 'font-size:9px;color:#ff4444;';
          err.textContent = e.message;
          card.appendChild(err);
          errors++;
        }
      }

      skinDiv.appendChild(row);
      section.appendChild(skinDiv);
    }

    charContent.appendChild(section);
    // Apply active filter immediately
    section.style.display = (charFilter === 'all' || section.dataset.class === charFilter) ? '' : 'none';
  }

  charStatus.textContent = `Loaded: ${loaded} animations | Errors: ${errors}`;
  tabLoaded.characters = true;
}

function validateSprite(skill, json, img) {
  const issues  = [];
  const frames  = json.frames;
  const meta    = json.meta;
  const sheetW  = meta.size.w;
  const sheetH  = meta.size.h;

  if (img.naturalWidth !== sheetW || img.naturalHeight !== sheetH)
    issues.push({ severity: 'error', msg: `PNG size ${img.naturalWidth}×${img.naturalHeight} ≠ meta ${sheetW}×${sheetH}` });

  frames.forEach((f, i) => {
    const r = f.frame;
    if (r.x + r.w > sheetW || r.y + r.h > sheetH)
      issues.push({ severity: 'error', msg: `Frame ${i} out of bounds (${r.x},${r.y}) ${r.w}×${r.h}` });
  });

  const durations = [...new Set(frames.map(f => f.duration))];
  if (durations.length > 1)
    issues.push({ severity: 'warning', msg: `Mixed durations: ${durations.join(', ')}ms` });

  if (meta.skill) {
    const total = frames.reduce((s, f) => s + f.duration, 0);
    if (Math.abs(total - meta.skill.renderDurationMs) > 50)
      issues.push({ severity: 'warning', msg: `renderDuration ${meta.skill.renderDurationMs}ms ≠ sum(frames) ${total}ms` });
  }

  const sizes = [...new Set(frames.map(f => `${f.frame.w}×${f.frame.h}`))];
  if (sizes.length > 1)
    issues.push({ severity: 'error', msg: `Inconsistent frame sizes: ${sizes.join(', ')}` });

  return issues;
}

async function loadSkills() {
  const variant = skillsVariant.value;
  skillsGrid.innerHTML = '';
  skillsReport.style.display = 'none';
  let loaded = 0, errors = 0;
  skillsStatus.textContent = `Loading skills (${variant})…`;

  for (const skill of SKILLS) {
    const effectiveVariant = skill.variants
      ? (skill.variants.includes(variant) ? variant : skill.variants[0])
      : variant;

    const jsonPath = `skils_sprites/${skill.folder}/${effectiveVariant}/${skill.json}`;
    const pngPath  = `skils_sprites/${skill.folder}/${effectiveVariant}/${skill.png}`;

    const card = document.createElement('div');
    card.className = 'sprite-card';
    card.dataset.group   = skill.group;
    card.dataset.skillId = skill.id;

    const title = document.createElement('h3');
    title.textContent = skill.id + (skill.variants ? ` [${effectiveVariant}]` : '');
    card.appendChild(title);

    const info = document.createElement('div');
    info.className = 'info';
    card.appendChild(info);

    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    card.appendChild(canvas);

    const frameInfo = document.createElement('div');
    frameInfo.className = 'frame-info';
    card.appendChild(frameInfo);

    const issuesList = document.createElement('ul');
    issuesList.className = 'issues';
    card.appendChild(issuesList);

    skillsGrid.appendChild(card);

    try {
      const resp = await fetch(jsonPath);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json = await resp.json();

      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = () => rej(new Error('PNG load failed'));
        img.src = pngPath;
      });

      const issues = validateSprite(skill, json, img);
      const fw = json.frames[0]?.frame?.w || 64;
      const fh = json.frames[0]?.frame?.h || 64;
      canvas.width  = Math.ceil(Math.min(128 / fw, 128 / fh, 4) * fw);
      canvas.height = Math.ceil(Math.min(128 / fw, 128 / fh, 4) * fh);

      const renderType = json.meta?.skill?.renderType || 'unknown';
      const duration   = json.meta?.skill?.renderDurationMs || '?';
      info.textContent = `${json.frames.length}f | ${fw}×${fh} | ${renderType} | ${duration}ms`;

      if (issues.length > 0) {
        card.classList.add(issues.some(i => i.severity === 'error') ? 'error' : 'warning');
        issues.forEach(issue => {
          const li = document.createElement('li');
          li.textContent = issue.msg;
          li.style.color = issue.severity === 'error' ? '#ff4444' : '#ffaa00';
          issuesList.appendChild(li);
        });
      }

      const sd = { json, img, canvas, frameInfo, currentFrame: 0, elapsed: 0, issues };
      skillData[skill.id] = sd;
      drawFrame(sd);
      loaded++;
    } catch (e) {
      card.classList.add('error');
      info.textContent = `LOAD ERROR: ${e.message}`;
      errors++;
    }
  }

  skillsStatus.textContent = `Loaded: ${loaded}/${SKILLS.length} | Errors: ${errors} | Variant: ${variant}`;
  applySkillsFilter();
  tabLoaded.skills = true;
}

function runValidation() {
  skillsReport.style.display = 'block';
  let report = '=== VALIDATION REPORT ===\n\n';
  let totalIssues = 0, errorCount = 0, warnCount = 0;

  for (const skill of SKILLS) {
    const sd = skillData[skill.id];
    if (!sd) { report += `[ERROR] ${skill.id}: Failed to load\n`; errorCount++; continue; }
    if (sd.issues.length > 0) {
      report += `${skill.id}:\n`;
      sd.issues.forEach(issue => {
        const tag = issue.severity === 'error' ? 'ERROR' : 'WARN';
        report += `  [${tag}] ${issue.msg}\n`;
        if (issue.severity === 'error') errorCount++; else warnCount++;
        totalIssues++;
      });
      report += '\n';
    }
  }

  report += totalIssues === 0
    ? 'All sprites passed validation!\n'
    : `\nTotal: ${totalIssues} issues (${errorCount} errors, ${warnCount} warnings)\n`;

  skillsReport.textContent = report;
}

function renderEquipment() {
  const container = document.getElementById('equip-content');
  const status    = document.getElementById('equip-status');
  container.innerHTML = '';

  // Helper: tier range cell
  const trCell = (ranges, tierIdx) => {
    if (!ranges || !ranges[tierIdx]) return '<td class="tier-val">—</td>';
    const [mn,mx] = ranges[tierIdx];
    return `<td class="tier-val">${mn}–${mx}</td>`;
  };

  // Helper: rarity badge
  const rarBadge = (id, def) =>
    `<span class="rarity-badge" style="background:${def.color}">${def.label}</span>`;

  // Helper: stat badge
  const statBdg = (statId) => {
    const sd = EQUIP_STAT_DEFS[statId];
    if (!sd) return '';
    return `<span class="stat-badge ${sd.cat}">${sd.name}</span>`;
  };

  let html = '';

  // ── 1. RARITIES ──
  html += '<div class="equip-section"><h2>Rarities</h2><div class="equip-cards">';
  for (const [id, r] of Object.entries(EQUIP_RARITIES)) {
    html += `<div class="equip-card" style="border-color:${r.color}">
      <div class="card-title" style="color:${r.color}">${r.label}</div>
      <div class="card-detail">
        Stats: ${r.statCount[0]}${r.statCount[1] !== r.statCount[0] ? '–'+r.statCount[1] : ''}<br>
        Drop weight: ${r.dropWeight}%
      </div>
    </div>`;
  }
  html += '</div></div>';

  // ── 2. TIERS ──
  html += `<div class="equip-section"><h2>Tier System</h2>
    <table class="equip-table"><thead><tr>
      <th>Tier</th><th>Item Level</th><th>Req Level</th>
    </tr></thead><tbody>`;
  for (let i = 0; i < 5; i++) {
    const [lo, hi] = EQUIP_TIER_RANGES[i];
    const reqLo = Math.floor(lo * 0.75);
    const reqHi = Math.floor(hi * 0.75);
    html += `<tr>
      <td style="color:#DFFFFE;font-weight:bold">${EQUIP_TIER_NAMES[i]}</td>

      <td class="tier-val">${reqLo}–${reqHi}</td>

  html += '</tbody></table></div>';

  // ── 3. EQUIPMENT SLOTS ──
  html += '<div class="equip-section"><h2>Equipment Slots</h2><div class="equip-cards" style="flex-wrap:wrap">';

      <div style="margin-top:4px">${pool.map(statBdg).join('')}</div>

  }
  html += '</div></div>';

  // ── 4. ALL SUBTYPES ──
  html += `<div class="equip-section"><h2>All Subtypes (${EQUIP_SUBTYPES.length})</h2>
    <table class="equip-table"><thead><tr>
      <th>Subtype</th><th>Slot</th><th>Description</th><th>Implicit</th><th>T5</th><th>T4</th><th>T3</th><th>T2</th><th>T1</th>

      if (sd.cat !== cat) continue;
      const slots = Object.entries(EQUIP_SLOT_STAT_POOLS)
        .filter(([,pool]) => pool.includes(statId))
        .map(([slotId]) => `<span class="slot-badge">${EQUIP_SLOT_DEFS[slotId]?.name || slotId}</span>`)
        .join('');
      html += `<tr>
        <td style="color:#F9CF87">${sd.name}</td>
        <td style="color:#DFFFFE;font-family:monospace">${sd.unit}</td>
        <td>${slots}</td>
      </tr>`;
    }
  }
  html += '</tbody></table></div>';

  // ── 6. BASE WEAPON DAMAGE ──
  html += `<div class="equip-section"><h2>Base Weapon Damage</h2>
    <table class="equip-table"><thead><tr>
      <th>Weapon</th><th>T5</th><th>T4</th><th>T3</th><th>T2</th><th>T1</th>
    </tr></thead><tbody>`;
  for (const [slot, ranges] of Object.entries(EQUIP_BASE_WEAPON_DMG)) {
    const name = EQUIP_SLOT_DEFS[slot]?.name || slot;
    html += `<tr><td style="color:#F9CF87;font-weight:bold">${name}</td>`;
    for (let t = 0; t < 5; t++) html += trCell(ranges, t);
    html += '</tr>';
  }
  html += '</tbody></table></div>';

  // ── 7. BASE DEFENSES ──
  html += `<div class="equip-section"><h2>Base Defenses</h2>
    <table class="equip-table"><thead><tr>
      <th>Slot</th><th>Type</th><th>T5</th><th>T4</th><th>T3</th><th>T2</th><th>T1</th>
    </tr></thead><tbody>`;
  for (const [slot, defs] of Object.entries(EQUIP_BASE_DEFENSES)) {
    const name = EQUIP_SLOT_DEFS[slot]?.name || slot;
    let first = true;
    for (const [defType, ranges] of Object.entries(defs)) {
      html += `<tr>`;
      if (first) {
        html += `<td rowspan="3" style="color:#F9CF87;font-weight:bold;vertical-align:middle">${name}</td>`;
        first = false;
      }
      html += `<td style="color:#DFFFFE">${defType.charAt(0).toUpperCase()+defType.slice(1)}</td>`;
      for (let t = 0; t < 5; t++) html += trCell(ranges, t);
      html += '</tr>';
    }
  }
  html += '</tbody></table></div>';

  // ── 8. STAT RANGES BY SLOT ──
  html += '<div class="equip-section"><h2>Stat Ranges by Slot</h2>';
  for (const slotId of slotOrder) {
    const slotName = EQUIP_SLOT_DEFS[slotId]?.name || slotId;
    const ranges = EQUIP_STAT_RANGES[slotId];
    if (!ranges) continue;
    html += `<details class="equip-details"><summary>${slotIcons[slotId] || ''} ${slotName}</summary>
      <div class="details-body">
        <table class="equip-table"><thead><tr>
          <th>Stat</th><th>T5</th><th>T4</th><th>T3</th><th>T2</th><th>T1</th>
        </tr></thead><tbody>`;
    for (const [statId, tiers] of Object.entries(ranges)) {
      const sd = EQUIP_STAT_DEFS[statId];
      html += `<tr><td style="color:#F9CF87">${sd ? sd.name : statId}</td>`;
      for (let t = 0; t < 5; t++) html += trCell(tiers, t);
      html += '</tr>';
    }
    html += '</tbody></table></div></details>';
  }
  html += '</div>';

  // ── 9. FORMULAS ──
  html += `<div class="equip-section"><h2>Equipment Formulas</h2>
    <div class="formula-box">
      <strong>Physical Damage:</strong><br>
      &nbsp;&nbsp;finalDmg = floor((baseDmg + flat_phys_dmg) \u00D7 (1 + pct_phys_dmg / 100))<br><br>
      <strong>Max HP:</strong><br>
      &nbsp;&nbsp;maxHp = floor((baseHp + flat_hp) \u00D7 (1 + pct_hp / 100))<br><br>
      <strong>Armor Reduction:</strong><br>
      &nbsp;&nbsp;reduction = armor / (armor + 10 \u00D7 enemyDamage)<br><br>
      <strong>Elemental Resistance:</strong><br>
      &nbsp;&nbsp;cap = 75% (fire, cold, lightning, physical)<br><br>
      <strong>Block:</strong><br>
      &nbsp;&nbsp;Block chance from equipment (stacks with warrior class special)<br><br>
      <strong>Gold Find:</strong><br>
      &nbsp;&nbsp;goldReward = baseGold \u00D7 (1 + goldFind / 100)<br><br>
      <strong>XP Bonus:</strong><br>
      &nbsp;&nbsp;xpReward = baseXp \u00D7 (1 + xpBonus / 100)
    </div>
  </div>`;

  container.innerHTML = html;
  status.textContent = `Equipment reference loaded: ${EQUIP_SUBTYPES.length} subtypes, ${Object.keys(EQUIP_STAT_DEFS).length} stats, 5 tiers, 4 rarities`;
  tabLoaded.equipment = true;
}

// ═════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════

rafHandle = requestAnimationFrame(loop);
loadCharacters(); // load first tab eagerly on page open
</script>
</body>
</html>
