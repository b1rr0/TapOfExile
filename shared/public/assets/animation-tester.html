<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Animation Tester — Tap of Exile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #101524; color: #F9CF87; font-family: monospace; padding: 16px; }

  h1 { text-align: center; margin-bottom: 12px; font-size: 18px; letter-spacing: 1px; }

  /* ── Tab Nav ── */
  .tab-nav { display: flex; gap: 4px; justify-content: center; margin-bottom: 12px; }
  .tab-nav button {
    background: #1a2040; color: #F9CF87; border: 1px solid #A40239;
    padding: 8px 24px; font-family: monospace; font-size: 13px;
    border-radius: 4px; cursor: pointer;
  }
  .tab-nav button:hover { background: #A40239; }
  .tab-nav button.active { background: #A40239; }

  /* ── Global Controls ── */
  #controls {
    display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    align-items: center; justify-content: center;
  }
  #controls label { color: #F9CF87; font-size: 13px; }
  #controls select, #controls button, #controls input {
    background: #1a2040; color: #F9CF87; border: 1px solid #A40239;
    padding: 6px 10px; font-family: monospace; font-size: 13px; border-radius: 4px;
  }
  #controls button { cursor: pointer; }
  #controls button:hover { background: #A40239; }
  #controls button.active { background: #A40239; }

  /* ── Status ── */
  .status { text-align: center; margin-bottom: 8px; font-size: 12px; color: #DFFFFE; min-height: 18px; }

  /* ── Sub-controls / filter bar ── */
  .filter-bar {
    display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px;
  }
  .filter-bar button, .filter-bar label { color: #F9CF87; font-size: 12px; }
  .filter-bar button {
    background: #1a2040; border: 1px solid #A40239;
    padding: 4px 10px; font-family: monospace; border-radius: 4px; cursor: pointer;
  }
  .filter-bar button:hover { background: #A40239; }
  .filter-bar button.active { background: #A40239; }
  .filter-bar select {
    background: #1a2040; color: #F9CF87; border: 1px solid #A40239;
    padding: 4px 10px; font-family: monospace; font-size: 12px; border-radius: 4px; cursor: pointer;
  }

  /* ── Tab Panes ── */
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Shared grid ── */
  .grid { display: flex; flex-wrap: wrap; gap: 16px; justify-content: center; }

  /* ── Character sections ── */
  .char-section {
    margin-bottom: 24px; border: 1px solid #333; border-radius: 8px;
    padding: 16px; background: #0d1120;
  }
  .char-section h2 {
    font-size: 14px; margin-bottom: 12px; color: #DFFFFE;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .skin-label { font-size: 12px; color: #B9508D; margin-bottom: 4px; }
  .skin-row { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; align-items: flex-start; }
  .anim-card {
    background: #1a2040; border: 1px solid #333; border-radius: 6px;
    padding: 8px; text-align: center; min-width: 100px;
  }
  .anim-card.error { border-color: #ff4444; }
  .anim-name { font-size: 10px; color: #888; margin-bottom: 4px; }

  /* ── Sprite cards (enemies & skills) ── */
  .sprite-card {
    background: #1a2040; border: 1px solid #333; border-radius: 8px;
    padding: 12px; width: 200px; text-align: center;
  }
  .sprite-card.error { border-color: #ff4444; }
  .sprite-card.warning { border-color: #ffaa00; }
  .sprite-card h3 { font-size: 12px; margin-bottom: 4px; word-break: break-all; }
  .sprite-card .info { font-size: 10px; color: #888; margin-bottom: 8px; }
  .sprite-card .frame-info { font-size: 10px; color: #DFFFFE; }
  .sprite-card .issues { font-size: 10px; text-align: left; margin-top: 4px; }
  .sprite-card .issues li { margin-left: 12px; }

  /* ── Shared canvas ── */
  canvas {
    border: 1px solid #333; image-rendering: pixelated;
    display: block; margin: 0 auto 4px;
    background: repeating-conic-gradient(#222 0% 25%, #333 0% 50%) 0 0 / 12px 12px;
  }
  .frame-info { font-size: 9px; color: #DFFFFE; }

  /* ── Validation report ── */
  #skills-report {
    background: #1a2040; border: 1px solid #333; border-radius: 8px;
    padding: 16px; margin-top: 16px; font-size: 12px;
    white-space: pre-wrap; max-height: 400px; overflow-y: auto;

function parseFrames(json) {
  return Array.isArray(json.frames) ? json.frames : Object.values(json.frames);
}

/** Draw current frame of a sprite onto its canvas. */
function drawFrame(sd) {
  const frames = sd.frames ?? sd.json?.frames;
  if (!frames) return;
  const f = frames[sd.currentFrame];
  if (!f) return;
  const ctx = sd.canvas.getContext('2d');
  ctx.clearRect(0, 0, sd.canvas.width, sd.canvas.height);
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(sd.img, f.frame.x, f.frame.y, f.frame.w, f.frame.h,
                0, 0, sd.canvas.width, sd.canvas.height);
  if (sd.frameInfo) sd.frameInfo.textContent = `${sd.currentFrame + 1}/${frames.length}`;
}

/** Advance frame timers for all sprites in a collection. */
function advanceSprites(collection, dt) {
  const speed = parseFloat(speedSlider.value);
  const items = Array.isArray(collection) ? collection : Object.values(collection);
  for (const sd of items) {
    const frames = sd.frames ?? sd.json?.frames;
    if (!frames || frames.length === 0) continue;
    sd.elapsed += dt * speed;
    const dur = frames[sd.currentFrame]?.duration || 100;
    if (sd.elapsed >= dur) {
      sd.elapsed -= dur;
      sd.currentFrame = (sd.currentFrame + 1) % frames.length;
    }
  }
}

/** Draw all sprites in a collection (active tab only). */
function drawAll(collection) {
  const items = Array.isArray(collection) ? collection : Object.values(collection);
  for (const sd of items) drawFrame(sd);
}

/** Step one frame forward for all sprites in a collection. */
function stepCollection(collection) {
  const items = Array.isArray(collection) ? collection : Object.values(collection);
  for (const sd of items) {
    const frames = sd.frames ?? sd.json?.frames;
    if (!frames || frames.length === 0) continue;
    sd.currentFrame = (sd.currentFrame + 1) % frames.length;
    drawFrame(sd);
  }
}

// ═════════════════════════════════════════════════════════════════
// SINGLE RAF LOOP
// ═════════════════════════════════════════════════════════════════

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;

  if (!paused) {
    // Advance time for ALL loaded tabs (so time doesn't freeze when switching)
    if (tabLoaded.characters) advanceSprites(charAnimData, dt);
    if (tabLoaded.enemies)    advanceSprites(enemyData, dt);
    if (tabLoaded.skills)     advanceSprites(skillData, dt);

    // Render only the visible tab
    if      (activeTab === 'characters' && tabLoaded.characters) drawAll(charAnimData);
    else if (activeTab === 'enemies'    && tabLoaded.enemies)    drawAll(enemyData);
    else if (activeTab === 'skills'     && tabLoaded.skills)     drawAll(skillData);
  }

  rafHandle = requestAnimationFrame(loop);
}

// ═════════════════════════════════════════════════════════════════
// GLOBAL CONTROLS
// ═════════════════════════════════════════════════════════════════

speedSlider.oninput = () => { speedVal.textContent = speedSlider.value + 'x'; };

document.getElementById('btnPause').onclick = function () {
  paused = !paused;
  this.textContent = paused ? 'Play' : 'Pause';
  this.classList.toggle('active', paused);
  if (!paused) lastTime = performance.now();
};

document.getElementById('btnStep').onclick = () => {
  if      (activeTab === 'characters') stepCollection(charAnimData);
  else if (activeTab === 'enemies')    stepCollection(enemyData);
  else if (activeTab === 'skills')     stepCollection(skillData);
};

// ═════════════════════════════════════════════════════════════════
// TAB SWITCHING
// ═════════════════════════════════════════════════════════════════

document.querySelectorAll('.tab-nav button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById(`tab-${activeTab}`).classList.add('active');
    // Lazy load first visit
    if (!tabLoaded[activeTab]) {
      if      (activeTab === 'characters') loadCharacters();
      else if (activeTab === 'enemies')    loadEnemies();
      else if (activeTab === 'skills')     loadSkills();
    }
  };
});

// ═════════════════════════════════════════════════════════════════
// TAB: CHARACTERS
// ═════════════════════════════════════════════════════════════════

let charFilter = 'all';

document.querySelectorAll('#char-filterBar button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#char-filterBar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    charFilter = btn.dataset.filter;
    document.querySelectorAll('.char-section').forEach(sec => {
      sec.style.display = (charFilter === 'all' || sec.dataset.class === charFilter) ? '' : 'none';
    });
  };
});

async function loadCharacters() {
  charAnimData.length = 0;
  charContent.innerHTML = '';
  let loaded = 0, errors = 0;
  charStatus.textContent = 'Loading characters…';

  for (const charClass of CHARACTERS) {
    const section = document.createElement('div');
    section.className = 'char-section';
    section.dataset.class = charClass.class;

    const h2 = document.createElement('h2');
    h2.textContent = charClass.class;
    section.appendChild(h2);

    for (const skin of charClass.skins) {
      const skinDiv = document.createElement('div');
      skinDiv.style.marginBottom = '12px';

      const label = document.createElement('div');
      label.className = 'skin-label';
      label.textContent = skin.id;
      skinDiv.appendChild(label);

      const row = document.createElement('div');
      row.className = 'skin-row';

      if (skin.anims.length === 0) {
        const note = document.createElement('div');
        note.style.cssText = 'font-size:11px;color:#ff4444;';
        note.textContent = 'No JSON animations found';
        row.appendChild(note);
        errors++;
      }

      const basePath = `characters/${charClass.class}/${skin.id}`;
      let spritesheetImg = null;

      for (const anim of skin.anims) {
        const card = document.createElement('div');
        card.className = 'anim-card';

        const animName = document.createElement('div');
        animName.className = 'anim-name';
        animName.textContent = anim;
        card.appendChild(animName);

        const canvas = document.createElement('canvas');
        canvas.width = 96; canvas.height = 96;
        card.appendChild(canvas);

        const frameInfo = document.createElement('div');
        frameInfo.className = 'frame-info';
        card.appendChild(frameInfo);

        row.appendChild(card);

        try {
          const resp = await fetch(`${basePath}/${anim}.json`);
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const json = await resp.json();
          const frames = parseFrames(json);
          const pngName = json.meta.image;

          let img;
          if (pngName === 'spritesheet.png' && spritesheetImg) {
            img = spritesheetImg;
          } else {
            img = new Image();
            img.crossOrigin = 'anonymous';
            await new Promise((res, rej) => {
              img.onload = res;
              img.onerror = () => rej(new Error('PNG load failed'));
              img.src = `${basePath}/${pngName}`;
            });
            if (pngName === 'spritesheet.png') spritesheetImg = img;
          }

          const fw = frames[0]?.frame?.w || 64;
          const fh = frames[0]?.frame?.h || 64;
          const scale = Math.min(96 / fw, 96 / fh, 4);
          canvas.width  = Math.ceil(fw * scale);
          canvas.height = Math.ceil(fh * scale);

          const sd = { frames, img, canvas, frameInfo, currentFrame: 0, elapsed: 0 };
          charAnimData.push(sd);
          drawFrame(sd);
          loaded++;
        } catch (e) {
          card.classList.add('error');
          const err = document.createElement('div');
          err.style.cssText = 'font-size:9px;color:#ff4444;';
          err.textContent = e.message;
          card.appendChild(err);
          errors++;
        }
      }

      skinDiv.appendChild(row);
      section.appendChild(skinDiv);
    }

    charContent.appendChild(section);
    // Apply active filter immediately
    section.style.display = (charFilter === 'all' || section.dataset.class === charFilter) ? '' : 'none';
  }

  charStatus.textContent = `Loaded: ${loaded} animations | Errors: ${errors}`;
  tabLoaded.characters = true;
}

// ═════════════════════════════════════════════════════════════════
// TAB: ENEMIES
// ═════════════════════════════════════════════════════════════════

function buildEnemyVariantButtons() {
  enemyVariantNav.innerHTML = '<span style="color:#888;font-size:11px;line-height:28px">Variant: </span>';
  for (let i = 0; i < 8; i++) {
    const btn = document.createElement('button');
    btn.textContent = i === 0 ? 'base' : `v${i}`;
    btn.classList.toggle('active', i === enemyVariantIdx);
    btn.onclick = () => {
      enemyVariantIdx = i;
      buildEnemyVariantButtons();
      reloadEnemies();
    };
    enemyVariantNav.appendChild(btn);
  }
}
buildEnemyVariantButtons();

enemyAnimSelect.onchange = reloadEnemies;

function reloadEnemies() {
  tabLoaded.enemies = false;
  for (const k in enemyData) delete enemyData[k];
  loadEnemies();
}

function enemyBasePath(enemy) {
  if (!enemy.variants) return `enemy/${enemy.folder}`;
  return `enemy/${enemy.folder}/${enemy.variants[enemyVariantIdx]}`;
}

async function loadEnemies() {
  const anim = enemyAnimSelect.value;
  enemyGrid.innerHTML = '';
  let loaded = 0, errors = 0;
  enemyStatus.textContent = `Loading enemies (${anim})…`;

  for (const enemy of ENEMIES) {
    const basePath    = enemyBasePath(enemy);
    const variantLabel = enemy.variants ? enemy.variants[enemyVariantIdx] : '';

    const card = document.createElement('div');
    card.className = 'sprite-card';

    const title = document.createElement('h3');
    title.textContent = enemy.id + (variantLabel ? ` [${variantLabel}]` : '');
    card.appendChild(title);

    const info = document.createElement('div');
    info.className = 'info';
    card.appendChild(info);

    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    card.appendChild(canvas);

    const frameInfo = document.createElement('div');
    frameInfo.className = 'frame-info';
    card.appendChild(frameInfo);

    enemyGrid.appendChild(card);

    try {
      const resp = await fetch(`${basePath}/${anim}.json`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json  = await resp.json();
      const frames = parseFrames(json);

      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = () => rej(new Error('PNG load failed'));
        img.src = `${basePath}/${json.meta.image}`;
      });

      const fw = frames[0]?.frame?.w || 64;
      const fh = frames[0]?.frame?.h || 64;
      canvas.width  = Math.ceil(Math.min(128 / fw, 128 / fh, 4) * fw);
      canvas.height = Math.ceil(Math.min(128 / fw, 128 / fh, 4) * fh);
      info.textContent = `${frames.length}f | ${fw}×${fh}`;

      const sd = { frames, img, canvas, frameInfo, currentFrame: 0, elapsed: 0 };
      enemyData[enemy.id] = sd;
      drawFrame(sd);
      loaded++;
    } catch (e) {
      card.classList.add('error');
      info.textContent = `No "${anim}": ${e.message}`;
      errors++;
    }
  }

  enemyStatus.textContent =
    `Loaded: ${loaded}/${ENEMIES.length} | Skipped: ${errors} | Anim: ${anim} | Variant: ${enemyVariantIdx}`;
  tabLoaded.enemies = true;
}

// ═════════════════════════════════════════════════════════════════
// TAB: SKILLS
// ═════════════════════════════════════════════════════════════════

let skillsFilter = 'all';

document.querySelectorAll('#skills-filterBar button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#skills-filterBar button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    skillsFilter = btn.dataset.filter;
    applySkillsFilter();
  };
});

function applySkillsFilter() {
  document.querySelectorAll('#skills-grid .sprite-card').forEach(card => {
    card.style.display = (skillsFilter === 'all' || card.dataset.group === skillsFilter) ? '' : 'none';
  });
}

skillsVariant.onchange = () => {
  tabLoaded.skills = false;
  for (const k in skillData) delete skillData[k];
  loadSkills();
};

document.getElementById('btnValidate').onclick = runValidation;

function validateSprite(skill, json, img) {
  const issues  = [];
  const frames  = json.frames;
  const meta    = json.meta;
  const sheetW  = meta.size.w;
  const sheetH  = meta.size.h;

  if (img.naturalWidth !== sheetW || img.naturalHeight !== sheetH)
    issues.push({ severity: 'error', msg: `PNG size ${img.naturalWidth}×${img.naturalHeight} ≠ meta ${sheetW}×${sheetH}` });

  frames.forEach((f, i) => {
    const r = f.frame;
    if (r.x + r.w > sheetW || r.y + r.h > sheetH)
      issues.push({ severity: 'error', msg: `Frame ${i} out of bounds (${r.x},${r.y}) ${r.w}×${r.h}` });
  });

  const durations = [...new Set(frames.map(f => f.duration))];
  if (durations.length > 1)
    issues.push({ severity: 'warning', msg: `Mixed durations: ${durations.join(', ')}ms` });

  if (meta.skill) {
    const total = frames.reduce((s, f) => s + f.duration, 0);
    if (Math.abs(total - meta.skill.renderDurationMs) > 50)
      issues.push({ severity: 'warning', msg: `renderDuration ${meta.skill.renderDurationMs}ms ≠ sum(frames) ${total}ms` });
  }

  const sizes = [...new Set(frames.map(f => `${f.frame.w}×${f.frame.h}`))];
  if (sizes.length > 1)
    issues.push({ severity: 'error', msg: `Inconsistent frame sizes: ${sizes.join(', ')}` });

  return issues;
}

async function loadSkills() {
  const variant = skillsVariant.value;
  skillsGrid.innerHTML = '';
  skillsReport.style.display = 'none';
  let loaded = 0, errors = 0;
  skillsStatus.textContent = `Loading skills (${variant})…`;

  for (const skill of SKILLS) {
    const effectiveVariant = skill.variants
      ? (skill.variants.includes(variant) ? variant : skill.variants[0])
      : variant;

    const jsonPath = `skils_sprites/${skill.folder}/${effectiveVariant}/${skill.json}`;
    const pngPath  = `skils_sprites/${skill.folder}/${effectiveVariant}/${skill.png}`;

    const card = document.createElement('div');
    card.className = 'sprite-card';
    card.dataset.group   = skill.group;
    card.dataset.skillId = skill.id;

    const title = document.createElement('h3');
    title.textContent = skill.id + (skill.variants ? ` [${effectiveVariant}]` : '');
    card.appendChild(title);

    const info = document.createElement('div');
    info.className = 'info';
    card.appendChild(info);

    const canvas = document.createElement('canvas');
    canvas.width = 128; canvas.height = 128;
    card.appendChild(canvas);

    const frameInfo = document.createElement('div');
    frameInfo.className = 'frame-info';
    card.appendChild(frameInfo);

    const issuesList = document.createElement('ul');
    issuesList.className = 'issues';
    card.appendChild(issuesList);

    skillsGrid.appendChild(card);

    try {
      const resp = await fetch(jsonPath);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json = await resp.json();

      const img = new Image();
      img.crossOrigin = 'anonymous';
      await new Promise((res, rej) => {
        img.onload = res;
        img.onerror = () => rej(new Error('PNG load failed'));
        img.src = pngPath;
      });

      const issues = validateSprite(skill, json, img);
      const fw = json.frames[0]?.frame?.w || 64;
      const fh = json.frames[0]?.frame?.h || 64;
      canvas.width  = Math.ceil(Math.min(128 / fw, 128 / fh, 4) * fw);
      canvas.height = Math.ceil(Math.min(128 / fw, 128 / fh, 4) * fh);

      const renderType = json.meta?.skill?.renderType || 'unknown';
      const duration   = json.meta?.skill?.renderDurationMs || '?';
      info.textContent = `${json.frames.length}f | ${fw}×${fh} | ${renderType} | ${duration}ms`;

      if (issues.length > 0) {
        card.classList.add(issues.some(i => i.severity === 'error') ? 'error' : 'warning');
        issues.forEach(issue => {
          const li = document.createElement('li');
          li.textContent = issue.msg;
          li.style.color = issue.severity === 'error' ? '#ff4444' : '#ffaa00';
          issuesList.appendChild(li);
        });
      }

      const sd = { json, img, canvas, frameInfo, currentFrame: 0, elapsed: 0, issues };
      skillData[skill.id] = sd;
      drawFrame(sd);
      loaded++;
    } catch (e) {
      card.classList.add('error');
      info.textContent = `LOAD ERROR: ${e.message}`;
      errors++;
    }
  }

  skillsStatus.textContent = `Loaded: ${loaded}/${SKILLS.length} | Errors: ${errors} | Variant: ${variant}`;
  applySkillsFilter();
  tabLoaded.skills = true;
}

function runValidation() {
  skillsReport.style.display = 'block';
  let report = '=== VALIDATION REPORT ===\n\n';
  let totalIssues = 0, errorCount = 0, warnCount = 0;

  for (const skill of SKILLS) {
    const sd = skillData[skill.id];
    if (!sd) { report += `[ERROR] ${skill.id}: Failed to load\n`; errorCount++; continue; }
    if (sd.issues.length > 0) {
      report += `${skill.id}:\n`;
      sd.issues.forEach(issue => {
        const tag = issue.severity === 'error' ? 'ERROR' : 'WARN';
        report += `  [${tag}] ${issue.msg}\n`;
        if (issue.severity === 'error') errorCount++; else warnCount++;
        totalIssues++;
      });
      report += '\n';
    }
  }

  report += totalIssues === 0
    ? 'All sprites passed validation!\n'
    : `\nTotal: ${totalIssues} issues (${errorCount} errors, ${warnCount} warnings)\n`;

  skillsReport.textContent = report;
}

// ═════════════════════════════════════════════════════════════════
// INIT
// ═════════════════════════════════════════════════════════════════

rafHandle = requestAnimationFrame(loop);
loadCharacters(); // load first tab eagerly on page open
</script>
