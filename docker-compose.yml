services:
  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-tap_of_exile}
      POSTGRES_USER: ${DB_USER:-tap_of_exile}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tap_of_exile_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-tap_of_exile}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── NestJS API server ─────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network

  # ── Telegram bot (bot.ts) ─────────────────────────────────
  bot-tg:
    build:
      context: .
      dockerfile: docker/bot-tg.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      WEBAPP_URL: ${WEBAPP_URL}
    depends_on:
      - server
    networks:
      - app-network

  # ── Nginx (static + reverse proxy) ───────────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/bot-web.Dockerfile
    restart: unless-stopped
    ports:
      - "${WEBAPP_PORT:-80}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - server
    networks:
      - app-network

volumes:
  postgres_data:
  redis_data:

networks:
  app-network:
    driver: bridge
