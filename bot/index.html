<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>33Metro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- Loading screen -->
      <div id="loading-screen" class="screen">
        <div class="loading-title">33Metro</div>
        <div class="loading-subtitle">Samurai Idle</div>
      </div>

      <!-- Scene container (managed by SceneManager) -->
      <div id="scene-container"></div>

      <!-- Offline reward popup -->
      <div id="offline-popup" class="popup hidden">
        <div class="popup-content">
          <h2>Welcome Back!</h2>
          <p>You earned <span id="offline-gold">0</span> gold while away!</p>
          <button id="offline-claim" class="popup-button">Claim</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
